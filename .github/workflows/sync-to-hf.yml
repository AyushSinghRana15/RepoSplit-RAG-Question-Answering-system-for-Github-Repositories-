name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Sync to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -q huggingface-hub
          python3 << 'PYEOF'
          import os, shutil, tempfile, sys
          from huggingface_hub import HfApi

          hf_token = os.environ.get("HF_TOKEN", "")
          if not hf_token:
              print("HF_TOKEN not set — skipping sync")
              sys.exit(0)

          tmp = tempfile.mkdtemp()
          try:
              shutil.copytree("backend", os.path.join(tmp, "backend"))
              shutil.copy("spaces/backend/Dockerfile", os.path.join(tmp, "Dockerfile"))
              shutil.copy("spaces/backend/README.md", os.path.join(tmp, "README.md"))
              if os.path.exists("spaces/backend/.gitignore"):
                  shutil.copy("spaces/backend/.gitignore", os.path.join(tmp, ".gitignore"))

              api = HfApi(token=hf_token)
              api.upload_folder(
                  repo_id="AyushSingh15/CodeBase",
                  folder_path=tmp,
                  repo_type="space",
                  path_in_repo=".",
                  delete_patterns=["*"],
              )
              print("Sync successful")
          finally:
              shutil.rmtree(tmp, ignore_errors=True)
          PYEOF
